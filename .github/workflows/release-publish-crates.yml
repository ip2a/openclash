name: release-publish-crates

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Cargo.toml metadata
        shell: bash
        run: |
          grep -q '^name = "openclash"' Cargo.toml || { echo "[error] Package name mismatch"; exit 1; }
          grep -q '^readme = "README.md"' Cargo.toml || { echo "[error] Missing readme field"; exit 1; }
          grep -q '^repository = "https://github.com/ip2a/openclash"' Cargo.toml || { echo "[error] Missing repository field"; exit 1; }
          echo "[ok] Cargo.toml metadata valid"

      - name: Dry-run publish
        run: cargo publish --dry-run --locked --registry crates-io

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        run: cargo publish --locked --registry crates-io --token "${{ steps.auth.outputs.token }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
