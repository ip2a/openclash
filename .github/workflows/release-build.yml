name: release-build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build-${{ matrix.platform_id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_id: linux-x64-musl
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_binary: openclash
            build_tool: cargo
            can_smoke_test: true
          - platform_id: linux-arm64-musl
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            artifact_binary: openclash
            build_tool: cross
            can_smoke_test: false
          - platform_id: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_binary: openclash
            build_tool: cargo
            can_smoke_test: true
          - platform_id: win32-ia32
            runner: windows-2022
            target: i686-pc-windows-msvc
            artifact_binary: openclash.exe
            build_tool: cargo
            can_smoke_test: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.build_tool == 'cross'
        shell: bash
        run: cargo install cross --locked

      - name: Build target artifact
        shell: bash
        run: ./scripts/build_target.sh "${{ matrix.target }}" "${{ matrix.platform_id }}" "${{ matrix.artifact_binary }}"
        env:
          OPENCLASH_BUILD_TOOL: ${{ matrix.build_tool }}

      - name: Run smoke test
        if: matrix.can_smoke_test
        shell: bash
        run: ./scripts/smoke_test.sh "dist/${{ matrix.platform_id }}/${{ matrix.artifact_binary }}"

      - name: Verify Linux x64 binary is not glibc-linked
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          BIN="dist/${{ matrix.platform_id }}/${{ matrix.artifact_binary }}"
          file "${BIN}"
          if readelf -l "${BIN}" | grep -q 'Requesting program interpreter'; then
            echo "[error] Linux x64 artifact is dynamically linked"
            exit 1
          fi
          echo "[ok] Linux x64 artifact is statically linked"

      - name: Generate checksums
        shell: bash
        run: |
          cd "dist/${{ matrix.platform_id }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_binary }}" > SHA256SUMS
          else
            shasum -a 256 "${{ matrix.artifact_binary }}" > SHA256SUMS
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclash-${{ matrix.platform_id }}
          path: dist/${{ matrix.platform_id }}/*
          if-no-files-found: error
